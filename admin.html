<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPLE - Portfolio Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #ff4500;
            --glass-bg: rgba(25, 25, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-secondary {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        #portfolio-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 50px 150px 1fr 100px;
            gap: 20px;
            align-items: center;
        }

        .admin-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .thumbnail-preview {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
        }

        .item-fields {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .admin-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            border: 2px dashed var(--accent-color);
        }

        .admin-item.drag-over {
            border: 2px dashed var(--accent-color);
            background: rgba(255, 69, 0, 0.1);
        }

        .danger-btn {
            background: #dc3545;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #4caf50;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>SIMPLE Admin Dashboard</h1>
            <p style="color: var(--text-secondary);">Manage your portfolio items, order, and text.</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="github-settings" style="display: flex; align-items: center; gap: 5px; background: #222; padding: 5px 10px; border-radius: 5px; margin-right: 10px;">
                <label style="font-size: 12px; color: #888;">GitHub PAT:</label>
                <input type="password" id="gh-token" placeholder="ghp_..." style="background: transparent; border: 1px solid #444; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; width: 120px;" onchange="saveToken(this.value)">
            </div>
            <button class="btn btn-secondary" onclick="exportForGitHub()" style="background:#333; color:white;"><i class="fa-solid fa-code"></i> Copy for GitHub</button>
            <button class="btn btn-secondary" onclick="resetToDefaults()">Reset to Code Defaults</button>
            <button class="btn" onclick="saveData()"><i class="fa-solid fa-cloud-arrow-up"></i> Save & Sync to GitHub</button>
        </div>
    </header>

    <div style="margin-bottom: 20px;">
        <button class="btn btn-secondary" onclick="addNewItem()"><i class="fa-solid fa-plus"></i> Add New Item</button>
        <a href="index.html" class="btn btn-secondary" style="text-decoration: none; margin-left:10px;">Go to Website</a>
    </div>

    <div id="portfolio-list">
        <!-- Rendered by JS -->
    </div>

    <div id="toast" class="toast">Saved Successfully!</div>

    <script src="assets/portfolio.js"></script>
    <script src="admin.js"></script>
</body>
</html>
